<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | O.T.G On The Go Mobile Detailing</title>
    <meta name="description" content="Browse our complete portfolio of premium mobile car detailing work across Johannesburg. Before & after transformations, paint corrections, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --otg-green: #00ff66;
            --otg-gold: #ff6b00;
            --otg-dark: #0a0a0a;
            --otg-darker: #050505;
            --otg-light: #f0f0f0;
            --otg-white: #ffffff;
            --otg-glow: rgba(0, 255, 102, 0.4);
            --otg-gold-glow: rgba(255, 107, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--otg-darker);
            color: var(--otg-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--otg-dark); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--otg-green), var(--otg-gold));
            border-radius: 4px;
        }

        /* Header */
        .gallery-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 255, 102, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--otg-green);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: var(--otg-white);
            transform: translateX(-5px);
        }
        .back-link svg {
            transition: transform 0.3s ease;
        }
        .back-link:hover svg {
            transform: translateX(-4px);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--otg-white), var(--otg-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, var(--otg-green), #00cc44);
            color: var(--otg-dark);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 50px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .header-cta:hover {
            box-shadow: 0 0 20px var(--otg-glow);
            transform: scale(1.05);
        }

        /* Page Hero */
        .page-hero {
            padding: 8rem 2rem 3rem;
            text-align: center;
        }
        .page-hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--otg-white), var(--otg-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        .page-hero p {
            color: rgba(240, 240, 240, 0.6);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        /* Filter */
        .gallery-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid rgba(0, 255, 102, 0.15);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--otg-light);
        }
        .stat-pill strong {
            color: var(--otg-green);
            font-family: 'Orbitron', sans-serif;
        }

        /* Gallery Grid */
        .gallery-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            columns: 4;
            column-gap: 1rem;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1rem;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 102, 0.08);
            transition: all 0.4s ease;
        }
        .gallery-item:hover {
            border-color: var(--otg-green);
            box-shadow: 0 10px 30px rgba(0, 255, 102, 0.15);
            transform: translateY(-4px);
        }
        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox.open {
            display: flex;
            opacity: 1;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 102, 0.2);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }
        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            background: rgba(5, 5, 5, 0.8);
            border: 1px solid rgba(0, 255, 102, 0.3);
            border-radius: 50%;
            color: var(--otg-green);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .lightbox-close:hover {
            background: var(--otg-green);
            color: var(--otg-dark);
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(5, 5, 5, 0.7);
            border: 1px solid var(--otg-green);
            border-radius: 50%;
            color: var(--otg-green);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .lightbox-nav:hover {
            background: var(--otg-green);
            color: var(--otg-dark);
            box-shadow: 0 0 15px var(--otg-glow);
        }
        .lightbox-nav.prev { left: 1.5rem; }
        .lightbox-nav.next { right: 1.5rem; }
        .lightbox-counter {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--otg-green);
            letter-spacing: 2px;
        }

        /* Footer strip */
        .gallery-footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid rgba(0, 255, 102, 0.08);
            margin-top: 2rem;
        }
        .gallery-footer p {
            color: rgba(240, 240, 240, 0.4);
            font-size: 0.85rem;
        }
        .gallery-footer a {
            color: var(--otg-green);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .gallery-grid { columns: 3; }
        }
        @media (max-width: 768px) {
            .gallery-grid { columns: 2; padding: 1rem; }
            .gallery-header { padding: 0.8rem 1rem; }
            .header-title { display: none; }
            .page-hero { padding: 7rem 1.5rem 2rem; }
            .page-hero h1 { font-size: clamp(1.5rem, 6vw, 2.5rem); }
        }
        @media (max-width: 480px) {
            .gallery-grid { columns: 1; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="gallery-header">
        <a href="index.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Home
        </a>
        <span class="header-title">O.T.G Portfolio</span>
        <a href="https://wa.me/27622659920" target="_blank" class="header-cta">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.5A10 10 0 1 0 12 2z"/></svg>
            Get a Quote
        </a>
    </header>

    <!-- Hero -->
    <section class="page-hero">
        <h1>Our Work</h1>
        <p>Every vehicle tells a story. Here's a look at the transformations we deliver across Johannesburg — from daily drivers to weekend showpieces.</p>
        <div class="gallery-stats" id="galleryStats">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid">
        <!-- Populated by JS -->
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
        <button class="lightbox-nav prev" onclick="navLightbox(-1)">&#10094;</button>
        <button class="lightbox-nav next" onclick="navLightbox(1)">&#10095;</button>
        <img id="lightboxImg" src="" alt="Gallery Image">
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <!-- Footer -->
    <footer class="gallery-footer">
        <p>&copy; 2026 O.T.G On The Go Mobile Detailing. <a href="index.html">Back to Home</a> | <a href="https://wa.me/27622659920" target="_blank">WhatsApp Us</a></p>
    </footer>

    <script src="gallery_data.js"></script>
    <script>
        let allImages = [];
        let currentLightbox = 0;

        function initGalleryPage() {
            const data = window.galleryData;
            if (!data) return;

            allImages = data.gallery;
            const grid = document.getElementById('galleryGrid');
            const stats = document.getElementById('galleryStats');

            // Stats
            stats.innerHTML = `
                <div class="stat-pill"><strong>${allImages.length}</strong> Images</div>
                <div class="stat-pill"><strong>${data.featured.length}</strong> Featured</div>
                <div class="stat-pill">Updated <strong>${new Date(data.lastUpdated).toLocaleDateString()}</strong></div>
            `;

            // Grid
            allImages.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openLightbox(index);
                item.innerHTML = `<img src="${img}" alt="Detailing Work" loading="lazy">`;
                grid.appendChild(item);
            });
        }

        function openLightbox(index) {
            currentLightbox = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const counter = document.getElementById('lightboxCounter');

            img.src = allImages[index];
            counter.textContent = `${index + 1} / ${allImages.length}`;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        function navLightbox(dir) {
            currentLightbox = (currentLightbox + dir + allImages.length) % allImages.length;
            const img = document.getElementById('lightboxImg');
            const counter = document.getElementById('lightboxCounter');
            img.src = allImages[currentLightbox];
            counter.textContent = `${currentLightbox + 1} / ${allImages.length}`;
        }

        // Keyboard nav
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navLightbox(-1);
            if (e.key === 'ArrowRight') navLightbox(1);
        });

        // Click outside to close
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        });

        initGalleryPage();
    </script>
</body>
</html>
